name: Verification reminder

# A gentle every-other-day nudge to run VERIFICATION.md (the live-browser test checklist).
# Idempotent: if a "verification due" issue is already open it just bumps it with a
# comment rather than opening a duplicate. Runs from `main` only (scheduled workflows
# always do). Trigger manually any time via the Actions tab → Run workflow.
on:
  schedule:
    - cron: "0 14 */2 * *" # 14:00 UTC every other day (odd days of the month)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Open or bump the verification-due issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const body = [
              "Reminder: open **VERIFICATION.md** and run any ⏳ unverified or due items",
              "on https://planyr.io, then record the result in that file.",
              "",
              "- **Browser items:** click them through on the live app (signed in where noted).",
              "- **🌐 endpoint-liveness items:** a quick `curl`/REST probe, no browser needed.",
              "",
              "**⛔ Clear out what you finish (see the 'How to use this' rules at the top of the file):**",
              "- A **one-off** item (`Cadence: once`) that **fully passes** → MOVE its whole block to",
              "  **`VERIFICATION-DONE.md`** (don't just mark it ✅ in place — that's what bloats the file).",
              "- A **recurring** item (🌐 / `Cadence: every N days`) STAYS — just update `Last checked` /",
              "  `Next check`. A ❌ stays ❌ until re-fixed.",
              "",
              "Close this issue once the due items are checked off and the passed one-offs are archived.",
            ].join("\n");
            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "verification", per_page: 1,
            });
            if (open.length) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: open[0].number,
                body: "⏰ Still open — " + body,
              });
              core.info(`Bumped existing issue #${open[0].number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner, repo, title: "🔍 Verification due — run VERIFICATION.md",
                labels: ["verification"], body,
              });
              core.info(`Opened issue #${created.number}`);
            }
