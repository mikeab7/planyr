name: E2E (Playwright)

# Runs the Playwright e2e suite (B278) against the live/preview deploy and — on ANY failure —
# opens (or bumps) a single @claude GitHub issue with the report, so a broken markup tool is
# fixed before a customer hits it. This is the verifier half of the B421 shared-markup
# refinement loop (B281): the @claude issue is what drives the autonomous
# implement→test→fix→advance cycle for the remaining tool rows.
#
# Idempotent — one open "e2e-drift" issue is reused, not duplicated; auto-closed when green
# again. Same proven pattern as gis-drift.yml.
#
# Gated on the seeded account (B280): without the E2E_* secrets the auth-gated specs skip and
# only the logged-out smoke runs — still a useful signal, never a false alarm. Runs on a
# schedule + on demand (Actions → Run workflow); a Cloudflare deploy doesn't fire a repo
# event, so we poll rather than trigger on deploy.
on:
  schedule:
    - cron: "30 13 * * 1-5" # 13:30 UTC, weekdays
  workflow_dispatch:
    inputs:
      base_url:
        description: "Origin to test (defaults to the E2E_BASE_URL secret)"
        required: false

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run e2e suite
        id: e2e
        env:
          BASE_URL: ${{ github.event.inputs.base_url || secrets.E2E_BASE_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          set +e
          npm run e2e > e2e-report.txt 2>&1
          echo "code=$?" >> "$GITHUB_OUTPUT"
          echo "--- report ---"
          cat e2e-report.txt
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
      - name: Open or bump a @claude issue on failure
        if: steps.e2e.outputs.code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner, repo = context.repo.repo;
            let report = "";
            try { report = fs.readFileSync("e2e-report.txt", "utf8"); } catch (_) {}
            if (report.length > 5000) report = report.slice(-5000); // keep the issue body sane
            const body = [
              "@claude — the **markup e2e suite** (B278) failed against the deploy. A tool may have",
              "stopped arming/drawing, a property control may be missing, or a measure may be reading",
              "wrong — the kind of regression the B421 refinement loop exists to catch.",
              "",
              "Please reproduce locally (`npm run e2e`, or `BASE_URL=<url> npm run e2e`), find the",
              "failing tool, fix the engine/host wiring, and re-run. The tool×property spec in",
              "`src/shared/markup/tools.matrix.js` is the source of truth — do NOT edit it to make a",
              "red test pass; the code moves to match the matrix.",
              "",
              "```",
              report.trim() || "(no report captured)",
              "```",
            ].join("\n");
            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "e2e-drift", per_page: 1,
            });
            if (open.length) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open[0].number, body: "⏰ Still failing —\n\n" + body });
              core.info(`Bumped existing issue #${open[0].number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner, repo, title: "🎭 Markup e2e regressed — a tool failed its assertions",
                labels: ["e2e-drift"], body,
              });
              core.info(`Opened issue #${created.number}`);
            }
      - name: Close the e2e issue when green
        if: steps.e2e.outputs.code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "e2e-drift", per_page: 10,
            });
            for (const iss of open) {
              await github.rest.issues.createComment({ owner, repo, issue_number: iss.number, body: "✅ Markup e2e is green again — closing." });
              await github.rest.issues.update({ owner, repo, issue_number: iss.number, state: "closed" });
              core.info(`Closed issue #${iss.number}`);
            }
      # The suite runs under `set +e` (so the report uploads + the @claude issue opens even on
      # failure), which means the steps above always succeed. Without this gate the JOB would
      # report green on a red suite — exactly the masking that hid a 21-failure run. Fail last,
      # after the issue bookkeeping, so the run status is honest.
      - name: Reflect the e2e result in the job status
        if: steps.e2e.outputs.code != '0'
        run: |
          echo "e2e suite exited with code ${{ steps.e2e.outputs.code }} — failing the job."
          exit 1
