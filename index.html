<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Front door (marketing landing): a BRAND-NEW visitor who lands on "/" with no app
         data, no signed-in session, no deep-link hash, and no explicit ?app intent is sent
         to the marketing page at /landing/. Returning users (any planyr/supabase data in
         localStorage), deep links (#/…), and the landing's own "Start a site" links (/?app)
         all fall through and boot the app exactly as before — so nobody who already uses
         Planyr is disrupted. Runs FIRST, before any app work, and uses location.replace so
         the back button can't loop. /landing/ has no such redirect, so there is no loop. -->
    <script>
      (function () {
        try {
          if (navigator.webdriver) return; // never redirect automated browsers (e2e / ui-audit)
          var h = window.location.hash || "";
          if ((h && h !== "#") || /[?&]app\b/.test(window.location.search)) return; // explicit app entry
          // Supabase auth callbacks (email confirmation, password recovery, magic link, OAuth,
          // and error returns) come back to "/" with params on the QUERY string under the PKCE
          // flow (?code=…, ?error=…&error_description=…); a brand-new user confirming their email
          // has NO session yet, so without this they'd be bounced to /landing/ and the token lost.
          // (Hash-based implicit callbacks like #access_token=… are already covered above.) Let the
          // app boot so supabase-js can complete the exchange.
          var qs = window.location.search || "";
          if (/[?&](code|access_token|refresh_token|provider_token|error|error_code|error_description)=/.test(qs)
              || /[?&]type=(recovery|signup|magiclink|invite|email_change)\b/.test(qs)) return;
          var returning = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i) || "";
            if (k.indexOf("planarfit:") === 0 || /^sb-.*-auth-token$/.test(k)) { returning = true; break; }
          }
          if (!returning) window.location.replace("/landing/");
        } catch (e) { /* never block app boot */ }
      })();
    </script>
    <!-- Mobile pinch fix: on iOS Safari a two-finger pinch on the page zooms the whole
         document and, at minimum scale, pops the "show all tabs" overview — hijacking the
         gesture the user meant for the map/planner. The map (Leaflet) and the planner canvas
         drive their OWN pinch-zoom through touch/pointer events, which are SEPARATE from
         Safari's gesture* events, so cancelling these here stops the browser's page-zoom and
         tab-overview without touching in-app zoom. Runs before React so it covers first paint. -->
    <script>
      (function () {
        var stop = function (e) { e.preventDefault(); };
        document.addEventListener("gesturestart", stop, { passive: false });
        document.addEventListener("gesturechange", stop, { passive: false });
        document.addEventListener("gestureend", stop, { passive: false });
      })();
    </script>
    <!-- Pre-paint theme resolve (B274): set data-theme BEFORE first paint / before
         index.css applies, so the page never flashes the wrong theme. Mirrors
         ThemeProvider's resolve logic; localStorage is the source of truth. -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem("planyr.theme") || "system";
          var dark = c === "dark" || (c !== "light" && window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <!-- Boot watchdog (B758): the app's stale-chunk recovery (src/app/chunkReload.js +
         ErrorBoundary) lives INSIDE the main bundle, so it can't help when the main bundle
         ITSELF fails to load — e.g. a transient 404 on /assets/index-<hash>.js during the
         few seconds a fresh Cloudflare deploy is still propagating to an edge node. Without
         this, that window is a blank white screen: no app JS ran, so nothing can recover.
         This inline script is part of index.html (the one file that is never content-hashed
         and so never 404s), so it survives that failure and can act. It catches (A) a
         definitive load error on the entry <script>, and (B) a never-mounts timeout, then
         shows an honest "updating" message and does a BOUNDED, cache-busting reload to pick
         up the finished deploy — the entry-bundle analogue of the lazy-chunk guard
         (B221/B239). Runs only when the app is expected to boot; the /landing/ redirect
         above has already fired for brand-new visitors, so it never touches that path. -->
    <script>
      (function () {
        try {
          if (navigator.webdriver) return; // never reload automated browsers (e2e / ui-audit)
          var KEY = "planyr:bootReloadCount";
          var MAX = 3;          // most auto-reloads on a definitive load error, then manual
          var DELAY = 2500;     // ms to show the message + let the edge settle before reload
          var MOUNT_MS = 15000; // if #root never fills in this long, treat as a boot failure
          var handled = false, mounted = false, pollId = 0;

          function rootEl() { return document.getElementById("root"); }
          function isMounted() { var r = rootEl(); return !!(r && r.childElementCount > 0); }
          function getCount() { try { return Number(sessionStorage.getItem(KEY)) || 0; } catch (e) { return 0; } }
          function setCount(n) { try { sessionStorage.setItem(KEY, String(n)); } catch (e) {} }
          function clearCount() { try { sessionStorage.removeItem(KEY); } catch (e) {} }

          function overlay(title, body, stuck) {
            try {
              if (!document.body) return;
              var dark = document.documentElement.getAttribute("data-theme") === "dark";
              var bg = dark ? "#14181d" : "#EAEEF3", fg = dark ? "#e7ecf2" : "#20262e",
                  sub = dark ? "#9fb0c0" : "#5b6672", acc = "#EF9F27";
              var el = document.getElementById("planyr-boot-overlay");
              if (!el) { el = document.createElement("div"); el.id = "planyr-boot-overlay"; document.body.appendChild(el); }
              el.setAttribute("style", "position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;"
                + "justify-content:center;background:" + bg + ";color:" + fg + ";font-family:Inter,system-ui,sans-serif;");
              var tail = stuck
                ? '<button id="planyr-boot-retry" style="margin-top:16px;padding:9px 18px;border:0;border-radius:8px;'
                  + 'background:' + acc + ';color:#1a1205;font-weight:700;font-size:14px;cursor:pointer;">Try again</button>'
                : '<div style="margin:16px auto 0;width:26px;height:26px;border:3px solid rgba(127,127,127,.3);'
                  + 'border-top-color:' + acc + ';border-radius:50%;animation:planyrspin .8s linear infinite;"></div>';
              el.innerHTML = '<style>@keyframes planyrspin{to{transform:rotate(360deg)}}</style>'
                + '<div style="text-align:center;max-width:340px;padding:24px;">'
                + '<div style="font-size:17px;font-weight:800;letter-spacing:-.01em;">' + title + '</div>'
                + '<div style="margin-top:8px;font-size:13.5px;line-height:1.5;color:' + sub + ';">' + body + '</div>'
                + tail + '</div>';
              var btn = document.getElementById("planyr-boot-retry");
              if (btn) btn.onclick = function () { clearCount(); location.reload(); };
            } catch (e) { /* overlay is best-effort — never let it throw */ }
          }

          function reloadFresh() {
            try {
              var u = new URL(window.location.href);
              u.searchParams.set("_r", String(Date.now())); // cache-buster; the app strips it after boot
              window.location.replace(u.toString());          // replace() so the dead page leaves no back-trap
            } catch (e) { try { window.location.reload(); } catch (e2) {} }
          }

          // kind "error" = a real load failure on the entry script (safe to auto-retry up
          // to MAX); kind "timeout" = never painted, cause unknown (allow only ONE auto
          // reload so a slow-but-fine bundle isn't re-downloaded to death), then manual.
          function recover(kind) {
            if (handled || mounted) return;
            handled = true;
            if (pollId) { clearInterval(pollId); pollId = 0; }
            var n = getCount(), cap = kind === "timeout" ? 1 : MAX;
            if (n >= cap) {
              overlay("Planyr is finishing an update",
                "A new version is still rolling out. Give it a moment, then try again — your work is saved.", true);
              return;
            }
            setCount(n + 1);
            overlay("Updating Planyr…", "Getting the latest version — this only takes a moment.", false);
            setTimeout(reloadFresh, DELAY);
          }

          // Signal A — the entry bundle failed to load (transient deploy-window 404, or a
          // network drop). Capture phase, because resource-load errors don't bubble. Filtered
          // to a not-yet-mounted app + an /assets/*.js <script> so a font/CSS/image error or a
          // late runtime throw (target === window) never trips it.
          window.addEventListener("error", function (e) {
            var t = e && e.target;
            if (!t || t === window || String(t.tagName).toLowerCase() !== "script") return;
            if (!isMounted() && /\/assets\/[^"']*\.js(\?|$)/.test(t.src || "")) recover("error");
          }, true);

          // Signal B — nothing errored but the app never painted (module threw at eval, a
          // statically-imported chunk 404'd, or a very slow link). Conservative timeout,
          // capped auto-retry so a genuinely slow connection isn't reloaded to death.
          setTimeout(function () { if (!mounted && !isMounted()) recover("timeout"); }, MOUNT_MS);

          // Success — clear the retry counter so a *future*, separate deploy gets a fresh
          // budget, drop any overlay, and stand down. Poll (cheap) so we catch the mount
          // whenever React first paints, independent of load-event timing.
          function onMount() {
            mounted = true; clearCount();
            if (pollId) { clearInterval(pollId); pollId = 0; }
            var el = document.getElementById("planyr-boot-overlay");
            if (el && el.parentNode) el.parentNode.removeChild(el);
          }
          pollId = setInterval(function () { if (isMounted()) onMount(); }, 200);
        } catch (e) { /* the watchdog must never block or break boot */ }
      })();
    </script>
    <meta name="theme-color" content="#EAEEF3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Planyr brand icons (generated from brand/planyr-favicon.svg via
         brand/generate-icons.mjs). SVG is preferred by modern browsers; the .ico
         is the legacy fallback; apple-touch-icon is the iOS home-screen tile. -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Planyr — Industrial site planning in your browser</title>
    <meta name="description" content="Turn a raw parcel into a yield-tested site plan in minutes: footprint, trailers, detention, coverage — before you tie the site up." />
    <link rel="canonical" href="https://planyr.io/" />
    <!-- Social card for the homepage URL (most-shared); reuses the landing's OG image. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Planyr" />
    <meta property="og:title" content="Planyr — know what the dirt can do" />
    <meta property="og:description" content="Turn a raw parcel into a yield-tested site plan in minutes: footprint, trailers, detention, coverage — before you tie the site up." />
    <meta property="og:url" content="https://planyr.io/" />
    <meta property="og:image" content="https://planyr.io/landing/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://planyr.io/landing/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
