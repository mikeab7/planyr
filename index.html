<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Front door (marketing landing): a BRAND-NEW visitor who lands on "/" with no app
         data, no signed-in session, no deep-link hash, and no explicit ?app intent is sent
         to the marketing page at /landing/. Returning users (any planyr/supabase data in
         localStorage), deep links (#/…), and the landing's own "Start a site" links (/?app)
         all fall through and boot the app exactly as before — so nobody who already uses
         Planyr is disrupted. Runs FIRST, before any app work, and uses location.replace so
         the back button can't loop. /landing/ has no such redirect, so there is no loop. -->
    <script>
      (function () {
        try {
          if (navigator.webdriver) return; // never redirect automated browsers (e2e / ui-audit)
          var h = window.location.hash || "";
          if ((h && h !== "#") || /[?&]app\b/.test(window.location.search)) return; // explicit app entry
          // Supabase auth callbacks (email confirmation, password recovery, magic link, OAuth,
          // and error returns) come back to "/" with params on the QUERY string under the PKCE
          // flow (?code=…, ?error=…&error_description=…); a brand-new user confirming their email
          // has NO session yet, so without this they'd be bounced to /landing/ and the token lost.
          // (Hash-based implicit callbacks like #access_token=… are already covered above.) Let the
          // app boot so supabase-js can complete the exchange.
          var qs = window.location.search || "";
          if (/[?&](code|access_token|refresh_token|provider_token|error|error_code|error_description)=/.test(qs)
              || /[?&]type=(recovery|signup|magiclink|invite|email_change)\b/.test(qs)) return;
          var returning = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i) || "";
            if (k.indexOf("planarfit:") === 0 || /^sb-.*-auth-token$/.test(k)) { returning = true; break; }
          }
          if (!returning) window.location.replace("/landing/");
        } catch (e) { /* never block app boot */ }
      })();
    </script>
    <!-- Mobile pinch fix: on iOS Safari a two-finger pinch on the page zooms the whole
         document and, at minimum scale, pops the "show all tabs" overview — hijacking the
         gesture the user meant for the map/planner. The map (Leaflet) and the planner canvas
         drive their OWN pinch-zoom through touch/pointer events, which are SEPARATE from
         Safari's gesture* events, so cancelling these here stops the browser's page-zoom and
         tab-overview without touching in-app zoom. Runs before React so it covers first paint. -->
    <script>
      (function () {
        var stop = function (e) { e.preventDefault(); };
        document.addEventListener("gesturestart", stop, { passive: false });
        document.addEventListener("gesturechange", stop, { passive: false });
        document.addEventListener("gestureend", stop, { passive: false });
      })();
    </script>
    <!-- Pre-paint theme resolve (B274): set data-theme BEFORE first paint / before
         index.css applies, so the page never flashes the wrong theme. Mirrors
         ThemeProvider's resolve logic; localStorage is the source of truth. -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem("planyr.theme") || "system";
          var dark = c === "dark" || (c !== "light" && window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <meta name="theme-color" content="#EAEEF3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Planyr brand icons (generated from brand/planyr-favicon.svg via
         brand/generate-icons.mjs). SVG is preferred by modern browsers; the .ico
         is the legacy fallback; apple-touch-icon is the iOS home-screen tile. -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Planyr - Project Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
