<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --surf:#f6f8fa; --bd:#e1e4e8; --bd2:#d0d7de;
  --amber:#4f46e5; --blue:#0969da; --txt:#1f2328; --mut:#57606a;
}

/* ── Suggestions queue view ───────────────────────────────────────── */
.sgq{ background:var(--surf); color:var(--txt); font-size:13px; line-height:1.5; }
.sgq .sgq-strip{ max-width:760px; margin:0 auto; padding:12px 20px 2px; color:var(--mut); font-size:12px; display:flex; align-items:center; gap:7px; }
.sgq .sgq-strip i{ color:#8b949e; font-size:15px; }
.sgq .sgq-wrap{ max-width:760px; margin:0 auto; padding:10px 20px 120px; display:flex; flex-direction:column; gap:12px; }
.sgq .sgq-card{ background:var(--bg); border:1px solid var(--bd); border-radius:10px; overflow:visible; box-shadow:0 1px 2px rgba(27,31,36,.04); transition:box-shadow .15s, border-color .15s; animation:sgq-rise .4s cubic-bezier(.2,.7,.3,1) both; }
.sgq .sgq-card:hover{ box-shadow:0 4px 14px rgba(27,31,36,.08); border-color:var(--bd2); }
@keyframes sgq-rise{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
.sgq .sgq-chead{ display:flex; align-items:flex-start; gap:11px; padding:13px 15px 10px; }
.sgq .sgq-avatar{ flex:none; width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:600; font-size:12px; }
.sgq .sgq-who{ flex:1; min-width:0; }
.sgq .sgq-subject{ font-weight:600; font-size:13px; color:var(--txt); margin-bottom:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sgq .sgq-frm{ font-size:11.5px; color:var(--mut); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sgq .sgq-frm b{ color:var(--txt); font-weight:500; }
.sgq .sgq-metacol{ flex:none; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.sgq .sgq-date{ font-size:11px; color:#8b949e; white-space:nowrap; }
.sgq .sgq-pill{ font-size:10.5px; font-weight:600; padding:2px 7px; border-radius:20px; white-space:nowrap; }
.sgq .sgq-pill.hi{ color:#16a34a; background:#dcfce7; }
.sgq .sgq-pill.mid{ color:#c47b00; background:#fef3c7; }
.sgq .sgq-pill.lo{ color:#dc2626; background:#fee2e2; }
.sgq .sgq-body{ padding:0 15px 13px; }
.sgq .sgq-mailprev{ font-size:12.5px; color:var(--mut); white-space:pre-wrap; line-height:1.55; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; padding:9px 11px; background:var(--surf); border:1px solid var(--bd); border-radius:7px; }
.sgq .sgq-mailprev.open{ display:block; -webkit-line-clamp:unset; }
.sgq .sgq-viewmail{ cursor:pointer; color:var(--mut); font-size:11.5px; display:inline-flex; align-items:center; gap:4px; margin-top:6px; }
.sgq .sgq-viewmail:hover{ color:var(--amber); }
.sgq .sgq-lbl{ font-size:10.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:#8b949e; margin:13px 0 5px 1px; }
.sgq .sgq-note{ width:100%; font:inherit; font-size:12.5px; color:var(--txt); background:var(--bg); border:1px solid var(--bd2); border-radius:7px; padding:8px 10px; resize:vertical; min-height:46px; line-height:1.55; box-sizing:border-box; }
.sgq .sgq-note:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 2px #eef2ff; }
.sgq .sgq-pickerbox{ background:var(--surf); border:1px solid var(--bd); border-radius:7px; padding:9px 10px; }
.sgq .sgq-pickerbox.warn{ background:#fffbf2; border-color:#f3e2bf; }
.sgq .sgq-target{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; background:var(--surf); border:1px solid var(--bd); border-radius:7px; padding:7px 10px; font-size:12px; }
.sgq .sgq-target.warnrow{ background:#fffbf2; border-color:#f3e2bf; }
.sgq .sgq-target > i{ font-size:15px; color:#8b949e; }
.sgq .sgq-crumbline{ font-size:12px; color:var(--txt); display:inline-flex; align-items:center; flex-wrap:wrap; }
.sgq .sgq-crumbline .sgq-arrow{ padding:0 3px; color:#8b949e; }
.sgq .sgq-hybridrow{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.sgq .sgq-linkbtn{ cursor:pointer; color:var(--mut); font-size:11.5px; margin-top:7px; display:inline-block; }
.sgq .sgq-linkbtn:hover{ color:var(--amber); }
.sgq .sgq-changebtn{ cursor:pointer; border:1px solid var(--bd2); background:var(--bg); color:var(--mut); font:inherit; font-size:11px; padding:4px 10px; border-radius:6px; display:inline-flex; align-items:center; gap:5px; transition:.12s; }
.sgq .sgq-changebtn:hover{ border-color:var(--amber); color:var(--amber); }
.sgq .sgq-ta{ position:relative; }
.sgq .sgq-ta-inputwrap{ display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--bd2); border-radius:6px; padding:5px 8px; }
.sgq .sgq-ta-inputwrap:focus-within{ border-color:var(--amber); box-shadow:0 0 0 2px #eef2ff; }
.sgq .sgq-ta-inputwrap i{ color:#8b949e; font-size:15px; }
.sgq .sgq-ta-input{ flex:1; border:none; outline:none; font:inherit; font-size:12.5px; background:transparent; color:var(--txt); }
.sgq .sgq-ta-list{ position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--bg); border:1px solid var(--bd2); border-radius:8px; box-shadow:0 8px 24px rgba(27,31,36,.12); max-height:240px; overflow:auto; z-index:30; }
.sgq .sgq-ta-item{ padding:7px 10px; cursor:pointer; border-bottom:1px solid var(--surf); }
.sgq .sgq-ta-item:last-child{ border-bottom:none; }
.sgq .sgq-ta-item:hover{ background:#eef2ff; }
.sgq .sgq-ta-item .sgq-nm{ font-size:12.5px; font-weight:600; color:var(--txt); }
.sgq .sgq-ta-item .sgq-cr{ font-size:10.5px; color:#8b949e; margin-top:1px; }
.sgq .sgq-ta-empty{ padding:9px 10px; font-size:12px; color:#8b949e; }
.sgq .sgq-needpick{ color:#c47b00; font-weight:600; font-size:11.5px; }
.sgq .sgq-changes{ margin-top:13px; }
.sgq .sgq-chg{ display:flex; align-items:center; gap:8px; padding:8px 9px; border:1px solid var(--bd); border-radius:7px; margin-bottom:6px; font-size:12px; background:var(--bg); }
.sgq .sgq-field{ font-weight:600; color:var(--mut); min-width:80px; }
.sgq .sgq-statuslabel{ display:inline-flex; align-items:center; gap:5px; }
.sgq .sgq-fromval{ color:#8b949e; text-decoration:line-through; display:inline-flex; align-items:center; gap:5px; }
.sgq .sgq-toarrow{ color:#8b949e; font-size:14px; }
.sgq .sgq-grow{ flex:1; }
.sgq .sgq-x{ cursor:pointer; color:#8b949e; font-size:15px; padding:2px; border-radius:5px; display:flex; }
.sgq .sgq-x:hover{ color:#dc2626; background:#fee2e2; }
.sgq .sgq-miniinput{ font:inherit; font-size:12px; color:var(--txt); background:var(--bg); border:1px solid var(--bd2); border-radius:6px; padding:2px 6px; }
.sgq .sgq-miniinput:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 2px #eef2ff; }
.sgq .sgq-miniinput[type=number]{ width:62px; }
.sgq .sgq-sel{ font:inherit; font-size:12px; color:var(--txt); background:var(--bg); border:1px solid var(--bd2); border-radius:6px; padding:3px 6px; cursor:pointer; }
.sgq .sgq-sel:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 2px #eef2ff; }
.sgq .sgq-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; flex:none; }
.sgq .sgq-foot{ display:flex; align-items:center; gap:9px; padding:11px 15px; border-top:1px solid var(--bd); background:#fafbfc; border-radius:0 0 10px 10px; }
.sgq .sgq-actbtn{ cursor:pointer; font:inherit; font-size:12px; font-weight:600; padding:6px 14px; border-radius:7px; border:1px solid transparent; display:inline-flex; align-items:center; gap:6px; transition:.12s; }
.sgq .sgq-actbtn.approve{ background:var(--amber); color:#fff; }
.sgq .sgq-actbtn.approve:hover{ background:#4338ca; }
.sgq .sgq-actbtn.approve:disabled{ background:#c7cbd1; cursor:not-allowed; }
.sgq .sgq-actbtn.reject{ background:var(--bg); color:var(--mut); border-color:var(--bd2); }
.sgq .sgq-actbtn.reject:hover{ border-color:#dc2626; color:#dc2626; }
.sgq .sgq-foot .sgq-hint{ font-size:11px; color:#8b949e; margin-left:auto; }
.sgq .sgq-empty{ text-align:center; padding:70px 20px; color:var(--mut); }
.sgq .sgq-empty h3{ font-size:15px; font-weight:600; color:var(--txt); margin-bottom:5px; }
.sgq .sgq-empty p{ font-size:12.5px; }
.sgq .sgq-loading{ text-align:center; padding:40px 20px; color:#8b949e; font-size:12.5px; }
.sgq .sgq-addchange{ margin-top:10px; }
.sgq .sgq-addrow{ display:flex; gap:6px; flex-wrap:wrap; }
.sgq .sgq-addbtn{ cursor:pointer; border:1px dashed var(--bd2); background:transparent; color:var(--mut); font:inherit; font-size:11px; padding:4px 10px; border-radius:6px; display:inline-flex; align-items:center; gap:4px; transition:.12s; }
.sgq .sgq-addbtn:hover{ border-color:var(--amber); border-style:solid; color:var(--amber); background:#eef2ff; }
.sgq .sgq-addbtn i{ font-size:13px; }

/* ── Review (suggestions redesign) ──────────────────────────────── */
.rev{ display:flex; flex-direction:column; height:100%; background:var(--bg); color:var(--txt); font-size:13px; min-height:0; }
.rev-loading{ padding:40px; text-align:center; color:#8b949e; font-size:12.5px; }
.rev-toolbar{ flex:none; display:flex; align-items:center; gap:12px; padding:8px 16px; border-bottom:1px solid var(--bd); background:var(--bg); }
.rev-seg{ display:flex; background:var(--surf); border:1px solid var(--bd); border-radius:7px; padding:2px; gap:2px; }
.rev-seg button{ cursor:pointer; border:none; background:transparent; font:inherit; font-size:12px; font-weight:500; color:var(--mut); padding:4px 12px; border-radius:5px; display:flex; align-items:center; gap:5px; transition:.12s; }
.rev-seg button i{ font-size:14px; }
.rev-seg button.on{ background:var(--bg); color:var(--amber); box-shadow:0 1px 2px rgba(27,31,36,.08); }
.rev-count{ font-size:11.5px; font-weight:600; color:var(--amber); background:#eef2ff; padding:3px 9px; border-radius:20px; }
.rev-close{ cursor:pointer; border:1px solid var(--bd2); background:var(--bg); color:var(--mut); font:inherit; font-size:12px; font-weight:500; padding:4px 11px; border-radius:7px; display:flex; align-items:center; gap:5px; transition:.12s; }
.rev-close:hover{ border-color:var(--amber); color:var(--amber); }
.rev-close i{ font-size:14px; }
.rev-spacer{ flex:1; }
.rev-khint{ font-size:11px; color:#8b949e; display:flex; align-items:center; gap:5px; }
.rev-khint kbd{ font-family:inherit; font-size:10px; background:var(--surf); border:1px solid var(--bd); border-bottom-width:2px; border-radius:4px; padding:1px 5px; color:var(--mut); }
.rev-body{ flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
.rev-top{ overflow:auto; min-height:0; background:var(--bg); }
.rev-bottom{ flex:1; overflow:hidden; min-height:0; background:var(--surf); border-top:1px solid var(--bd); }
.rev-div{ flex:none; height:9px; background:var(--surf); border-top:1px solid var(--bd); border-bottom:1px solid var(--bd); cursor:row-resize; display:flex; align-items:center; justify-content:center; transition:background .12s; }
.rev-div:hover{ background:#eef2ff; }
.rev-div .grip{ display:flex; gap:3px; }
.rev-div .grip i{ width:3px; height:3px; border-radius:50%; background:var(--bd2); }
.rev-div:hover .grip i{ background:var(--amber); }
.rev-hint{ padding:30px 18px; color:#8b949e; font-size:12.5px; text-align:center; }
.rev-grid{ min-width:680px; }
.rev-ghead,.rev-row,.rev-sub{ display:grid; grid-template-columns:minmax(200px,1fr) 84px 126px 156px 150px 64px; }
.rev-ghead{ position:sticky; top:0; z-index:5; background:#fafbfc; border-bottom:1px solid var(--bd); }
.rev-ghead .rev-cell{ font-size:10.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:#8b949e; padding:9px 12px; }
.rev-cell{ padding:0 12px; display:flex; align-items:center; min-width:0; }
.rev-row{ height:34px; border-bottom:1px solid var(--bd); position:relative; }
.rev-row:hover{ background:#fafbfc; }
.rev-row.pick{ cursor:pointer; }
.rev-row.tgt,.rev-row.tgt:hover{ background:#f5f3ff; }
.rev-row.tgt::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--amber); }
.rev-row.mv,.rev-row.mv:hover{ background:#fff8ee; }
.rev-name{ font-weight:500; gap:7px; overflow:hidden; }
.rev-name .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rev-row.tgt .rev-name .nm{ font-weight:600; }
.rev-sugdot{ flex:none; width:7px; height:7px; border-radius:50%; background:var(--amber); box-shadow:0 0 0 3px #eef2ff; }
.rev-date{ font-size:12.5px; color:var(--txt); gap:6px; }
.rev-date.faint{ color:#8b949e; }
.rev-delta{ font-size:10.5px; font-weight:600; color:#c47b00; background:#fff3d6; padding:1px 5px; border-radius:10px; white-space:nowrap; }
.revstatus{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--txt); }
.revdot{ width:9px; height:9px; border-radius:50%; flex:none; }
.rev-owner{ font-size:12.5px; color:var(--mut); overflow:hidden; }
.rev-owner .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rev-sub{ background:#ece9fe; border-bottom:1px solid #d9d3f7; height:36px; }
.rev-prop{ gap:7px; color:var(--amber); font-weight:500; }
.rev-prop i{ font-size:14px; }
.rev-endcell{ gap:6px; }
.rev-actcell{ justify-content:flex-end; gap:6px; }
.rev-edit{ width:100%; min-width:0; border:1px solid transparent; background:transparent; font:inherit; font-size:12.5px; color:var(--txt); padding:3px 6px; border-radius:5px; transition:.1s; }
.rev-edit:hover{ border-color:var(--bd2); background:#fff; }
.rev-edit:focus{ outline:none; border-color:var(--amber); background:#fff; box-shadow:0 0 0 2px #eef2ff; }
.rev-date-edit{ width:62px; }
.rev-sel{ border:1px solid var(--bd2); background:#fff; font:inherit; font-size:12px; color:var(--txt); padding:3px 6px; border-radius:6px; cursor:pointer; max-width:100%; }
.rev-sel:focus{ outline:none; border-color:var(--amber); box-shadow:0 0 0 2px #eef2ff; }
.rev-iconbtn{ cursor:pointer; width:24px; height:24px; border-radius:6px; border:1px solid var(--bd2); background:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; padding:0; transition:.12s; }
.rev-iconbtn.ok{ color:#16a34a; }
.rev-iconbtn.ok:hover{ background:#dcfce7; border-color:#16a34a; }
.rev-iconbtn.no{ color:var(--mut); }
.rev-iconbtn.no:hover{ background:#fee2e2; border-color:#dc2626; color:#dc2626; }
.rev-gantt{ display:flex; min-height:100%; }
.rev-glabels{ flex:none; width:200px; border-right:1px solid var(--bd); background:#fafbfc; position:sticky; left:0; z-index:6; }
.rev-glabhd{ height:40px; border-bottom:1px solid var(--bd); display:flex; align-items:flex-end; padding:0 12px 6px; font-size:10.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:#8b949e; }
.rev-glab{ height:30px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:7px; padding:0 12px; font-size:12px; font-weight:500; overflow:hidden; }
.rev-glab.tgt{ background:#f5f3ff; font-weight:600; }
.rev-glab.mv{ background:#fff8ee; }
.rev-glab .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rev-gcanvas{ position:relative; flex:1; overflow-x:auto; }
.rev-axis{ height:40px; border-bottom:1px solid var(--bd); position:relative; }
.rev-month{ position:absolute; top:6px; font-size:11px; font-weight:600; color:var(--mut); padding-left:6px; border-left:1px solid var(--bd); height:28px; }
.rev-weekend{ position:absolute; bottom:0; background:#f6f8fa; opacity:.7; }
.rev-wk{ position:absolute; bottom:0; width:1px; background:var(--bd); opacity:.5; }
.rev-grow{ position:absolute; left:0; right:0; height:30px; border-bottom:1px solid var(--bd); }
.rev-grow.tgt{ background:#f5f3ff; }
.rev-grow.mv{ background:#fff8ee; }
.rev-bar{ position:absolute; height:13px; top:9px; border-radius:3px; }
.rev-ghost{ position:absolute; height:13px; top:9px; border-radius:3px; border:1.4px dashed var(--bd2); background:transparent; }
.rev-amber{ position:absolute; height:13px; top:9px; border-radius:3px; background:#f0b552; border:1px solid #c47b00; }
.rev-flag{ position:absolute; top:6px; font-size:10px; font-weight:600; color:#c47b00; background:#fff3d6; border:1px solid #f0c98a; padding:1px 5px; border-radius:9px; white-space:nowrap; }
.rev-drawer{ max-width:none; margin:0; padding:16px 22px 18px; height:100%; box-sizing:border-box; display:flex; flex-direction:column; }
.rev-cols{ display:flex; gap:30px; align-items:stretch; flex:1; min-height:0; }
.rev-mail{ flex:0 1 780px; min-width:0; min-height:0; overflow:auto; }
.rev-card{ flex:1 1 460px; min-width:320px; background:var(--bg); border:1px solid var(--bd); border-radius:12px; padding:12px 14px; display:flex; flex-direction:column; min-height:0; overflow:auto; box-sizing:border-box; }
.rev-head{ display:flex; align-items:flex-start; gap:11px; }
.rev-av{ flex:none; width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:600; font-size:13px; }
.rev-who{ flex:1; min-width:0; }
.rev-who .rev-name{ font-weight:600; font-size:14px; }
.rev-email{ font-size:12px; color:var(--mut); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rev-meta{ flex:none; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.rev-date2{ font-size:11.5px; color:#8b949e; white-space:nowrap; }

body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--txt); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #b0b7c0; border-radius: 5px; border: 2px solid var(--bg); min-height: 60px; min-width: 60px; }
::-webkit-scrollbar-thumb:hover { background: #6e7680; }
.btn { cursor: pointer; border: 1px solid var(--bd2); background: var(--surf); color: var(--mut);
  padding: 3px 10px; border-radius: 3px; font-size: 11px; font-family: 'Inter', system-ui, sans-serif;
  transition: border-color .15s, color .15s; white-space: nowrap; line-height: 1.6; }
.btn:hover { border-color: var(--amber); color: var(--amber); }
.btn.act { border-color: var(--amber); color: var(--amber); background: #eef2ff; }
.btn.vact { border-color: var(--blue); color: var(--blue); }

/* ── Mobile-only header (≤ 767px). Desktop layout untouched. ── */
@media (max-width: 767px) {
  .app-header {
    display: grid !important;
    grid-template-columns: 1fr auto 1fr;
    grid-template-rows: auto auto;
    gap: 8px 8px !important;
    align-items: center;
    padding: 8px 10px !important;
  }
  /* Row 1 placement */
  .app-header > svg { grid-column: 1; grid-row: 1; justify-self: start; margin-right: 0 !important; }
  .app-header > .hdr-mode { grid-column: 2; grid-row: 1; }
  .app-header > .hdr-actions { grid-column: 3; grid-row: 1; justify-self: end; margin-left: 0 !important; }
  /* Row 2 — only renders in Projects mode */
  .app-header > .hdr-project { grid-column: 1; grid-row: 2; justify-self: start; margin-left: 0 !important; }
  .app-header > .hdr-view { grid-column: 2; grid-row: 2; margin-left: 0 !important; }
  /* Review toggle — explicit placement; un-placed grid items stretch to fill their cell */
  .app-header > .hdr-review { grid-column: 3; grid-row: 2; justify-self: end; margin-left: 0 !important; }
  /* Hide the flex spacer — irrelevant in grid */
  .app-header > div[style*="flex:1"] { display: none !important; }
  /* Hide divider line inside project picker wrap on mobile (no longer needed) */
  .app-header > .hdr-project > div[style*="width:1px"] { display: none !important; }
  /* Slightly larger tap targets */
  .app-header .btn { padding: 5px 10px !important; font-size: 11.5px !important; }
}
.ei { background: #ffffff; border: 1px solid var(--blue); outline: none; color: #1f2328;
  padding: 0 6px; font-size: 12px; font-family: 'Inter', system-ui, sans-serif; height: 36px; width: 100%; }
select.ei { cursor: pointer; }
/* Editors inside grid rows: fit the fixed 24px row exactly — the 36px base
   height is for larger form contexts and overflows/misaligns inside rows */
.drow .ei { height: 24px; border-radius: 0; }
.drow { display: flex; border-bottom: 1px solid var(--bd); border-left: 2px solid transparent;
  position: absolute; left: 0; right: 0; }
.drow:hover { box-shadow: inset 0 1px 0 #94a3b8, inset 0 -1px 0 #94a3b8; }

input[type=range]::-moz-range-thumb { width:14px; height:14px; border-radius:50%; background:var(--amber); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.2); cursor:pointer; }


/* When embedded in the Planyr shell, the shell's unified header now provides EVERYTHING
   this app's own header did: the Row-1 breadcrumb shows the logo + Dashboard/Projects
   toggle + project switcher (bridged over postMessage, B203), and the shell's Row-2 toolbar
   re-renders the action controls — view switcher, Review, Zoom, Export, Save, Version
   History, Contacts, Automation, Format, Settings — driving THIS app over the postMessage
   toolbar bridge (B388). So hide our own header entirely in-embed, or there'd be a double
   toolbar. (Its self-positioned panels/modals — Settings, Format, etc. — still render; they
   were never anchored to these buttons, so the buttons can live up in the shell.)
   History: B381 narrowed an earlier `.app-header{display:none}` to hide only the duplicated
   nav, because the action toolbar had no shell home yet. Now that the shell hosts the toolbar
   too (B388), hiding the whole header is correct again — the controls didn't vanish, they moved. */
html.in-iframe .app-header { display: none !important; }

      color:         isError ? "#991b1b" : "#166534",

      whiteSpace:    "nowrap",
      transition:    "opacity 0.18s ease, transform 0.18s ease",
      userSelect:    "none",
      maxWidth:      "420px",
      lineHeight:    "1.4",
    });

    const icon = document.createElement("span");
    icon.textContent = isError ? "⚠" : "✓";
    Object.assign(icon.style, {
      fontSize: "13px",
      flexShrink: "0",
      lineHeight: "1",
    });

    const text = document.createElement("span");
    text.textContent = msg;

    el.appendChild(icon);
    el.appendChild(text);
    document.body.appendChild(el);
    _activeToast = el;

    // Animate in
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.opacity = "1";
      el.style.transform = "translateX(-50%) translateY(0)";
    }));

    // Animate out and remove
    const timer = setTimeout(() => {
      el.style.opacity = "0";
      el.style.transform = "translateX(-50%) translateY(8px)";
      setTimeout(() => { el.remove(); if (_activeToast === el) _activeToast = null; }, 200);
    }, duration);

    return () => { clearTimeout(timer); el.remove(); if (_activeToast === el) _activeToast = null; };
  };
})();

const parsePreds = raw => {
  const str = String(raw||"").trim();
  if (!str) return [];
  return str.split(/[,;]/).map(p => {
    p = p.trim(); if (!p) return null;
    const m = p.match(/^(\d+)\s*(FS|FF|SS|SF)?\s*([+-]\s*\d+)?\s*d?$/i);
    if (!m) return null;
    return {id: parseInt(m[1]), type: (m[2]||"FS").toUpperCase(), lag: m[3] ? parseInt(m[3].replace(/\s/g,"")) : 0};
  }).filter(Boolean);
};

// Format [{id,type,lag}] → display string
const fmtPreds = preds => normPreds(preds).map(p => {
  let s = String(p.id);
  if (p.type !== "FS" || p.lag !== 0) {
    s += p.type;
    if (p.lag !== 0) s += (p.lag > 0 ? "+" : "") + p.lag + "d";
  }
  return s;
}).join(", ");

// Validate a proposed predecessor list for task `id` against the project's tasks. Returns
// { preds, selfRemoved, unknownIds, cyclic } where `preds` is the accepted subset with
//   • self-references dropped (a task can't depend on itself), and
//   • references to ids that don't exist in this project dropped (they'd render as a live
//     dependency but do nothing — cascadeDates filters them), and
//   • references that would create a circular dependency dropped (A→B→A produces silently
//     arbitrary dates otherwise — cascadeDates doesn't loop, but the result is meaningless).
// Pure (no React/DOM) so it's unit-testable; the caller surfaces a toast per dropped reason.
const validatePredEdit = (tasks, id, parsed) => {
  const list = Array.isArray(parsed) ? parsed : [];
  const selfRemoved = list.some(p => p && p.id === id);
  let preds = list.filter(p => p && p.id !== id);
  const known = new Set((Array.isArray(tasks) ? tasks : []).map(t => t.id));
  const unknownIds = [...new Set(preds.filter(p => !known.has(p.id)).map(p => p.id))];
  preds = preds.filter(p => known.has(p.id));
  // Existing depends-on adjacency (id → [predecessor ids]) from the stored tasks.
  const predMap = {};
  (Array.isArray(tasks) ? tasks : []).forEach(t => { predMap[t.id] = normPreds(t.predecessors).map(p => p.id); });
  // A new edge id→p closes a cycle iff p already (transitively) depends on id.
  const reachesId = startId => {
    const stack = [startId], seen = new Set();
    while (stack.length) {
      const cur = stack.pop();
      if (cur === id) return true;
      if (seen.has(cur)) continue; seen.add(cur);
      (predMap[cur] || []).forEach(x => stack.push(x));
    }
    return false;
  };
  const accepted = [], cyclic = [];
  preds.forEach(p => { if (reachesId(p.id)) cyclic.push(p.id); else accepted.push(p); });
  return { preds: accepted, selfRemoved, unknownIds, cyclic };
};

// Constrained start of a task given one predecessor dep (MS Project convention)
// End dates are INCLUSIVE (last working day of task), so:
//   FS: successor starts NEXT BD after pred.end  (+lag BDs on top)
//   SS: successor starts same day as pred.start  (+lag)
//   FF: successor ends same day as pred.end (+lag) → derive start
//   SF: successor ends same day as pred.start (+lag) → derive start
const constrainedStartFrom = (pred, dep, taskDur) => {
  const lag = dep.lag || 0;
  switch ((dep.type||"FS").toUpperCase()) {
    case "FS": return addBD(pred.end, 1 + lag);                                          // next BD + lag
    case "SS": return addBD(pred.start, lag);                                            // same start + lag
    case "FF": { const cEnd = addBD(pred.end, lag);                                      // end aligns + lag
                 return taskDur <= 1 ? cEnd : addBD(cEnd, 1 - taskDur); }
    case "SF": { const cEnd = addBD(pred.start, lag);                                    // finish at pred.start + lag
                 return taskDur <= 1 ? cEnd : addBD(cEnd, 1 - taskDur); }
    default:   return addBD(pred.end, 1 + lag);
  }
};

// end = last working day (inclusive). duration 0 = milestone (start=end)
const calcEnd = (start, dur) => !start ? "" : dur === 0 ? start : addBD(start, Math.max(0, dur - 1));

// Topological cascade: recompute start/end for all tasks driven by predecessors
const cascadeDates = tasks => {
  const map = {};
  tasks.forEach(t => { map[t.id] = {...t, predecessors: normPreds(t.predecessors)}; });
  const adj = {}; const inDeg = {};
  tasks.forEach(t => { adj[t.id] = []; inDeg[t.id] = 0; });
  tasks.forEach(t => map[t.id].predecessors.forEach(p => {
    if (map[p.id]) { adj[p.id].push(t.id); inDeg[t.id]++; }
  }));
  const queue = tasks.filter(t => inDeg[t.id] === 0).map(t => t.id);
  const seen = new Set(queue);
  let qi = 0;
  while (qi < queue.length) {
    const id = queue[qi++];
    (adj[id]||[]).forEach(sid => {
      inDeg[sid]--;
      if (inDeg[sid] <= 0 && !seen.has(sid)) { seen.add(sid); queue.push(sid); }
    });
  }
  tasks.forEach(t => { if (!seen.has(t.id)) queue.push(t.id); });

  queue.forEach(id => {
    const t = map[id];
    const preds = t.predecessors.filter(p => map[p.id]);
    // _pinStart preserves manually dragged/set positions. Duration-only edits (hasDirectEdit)
    // let predecessors re-anchor the start so successors cascade correctly.
    if (!preds.length || t.pinnedStart) { t.end = calcEnd(t.start, t.duration); return; }
    const starts = preds.map(p => constrainedStartFrom(map[p.id], p, t.duration)).filter(Boolean);
    if (!starts.length) { t.end = calcEnd(t.start, t.duration); return; }
    const latest = starts.reduce((a,b) => a>b?a:b, starts[0] || t.start);
    t.start = latest;
    t.end   = calcEnd(t.start, t.duration);
  });
  return tasks.map(t => { const {_pinStart, __wasDirectEdit, ...rest} = map[t.id] || t; return rest; });
};

// Roll up parent start/end/duration from their children (bottom-up, iterates until stable)
const rollupParentDates = tasks => {
  const map = {};
  tasks.forEach(t => { map[t.id] = {...t}; });
  const parentIds = new Set(tasks.filter(t => t.parentId !== null).map(t => t.parentId));
  if (!parentIds.size) return tasks;
  // Index children by parent ONCE. parentId never changes during rollup (only dates do),
  // so re-deriving the child list every pass with Object.values(map).filter was O(parents×n)
  // per pass — an O(n²·depth) blow-up that froze deeply-nested schedules (~11s at 1000 levels).
  // A Map keyed by the raw parentId value preserves the original strict-equality grouping.
  const childIdsByParent = new Map();
  tasks.forEach(t => {
    const p = t.parentId;
    if (p === null || p === undefined) return;
    if (!childIdsByParent.has(p)) childIdsByParent.set(p, []);
    childIdsByParent.get(p).push(t.id);
  });
  // Process parents deepest-first so a parent's children are already final when it's
  // read → the convergence loop settles in a single pass instead of O(depth) passes
  // (the while-loop stays as the correctness backstop). depthOf walks parentId upward
  // with a seen-set so a parentId cycle can't loop forever.
  const depthOf = id => {
    let d = 0, cur = id; const seen = new Set();
    while (cur !== null && cur !== undefined && map[cur] && !seen.has(cur)) { seen.add(cur); cur = map[cur].parentId; d++; }
    return d;
  };
  const ordered = [...parentIds].sort((a, b) => depthOf(b) - depthOf(a));
  let changed = true;
  while (changed) {
    changed = false;
    ordered.forEach(pid => {
      if (!map[pid]) return;   // orphaned parentId (points to a deleted/missing task) — skip, don't crash
      const children = (childIdsByParent.get(pid) || []).map(id => map[id]).filter(Boolean);
      if (!children.length) return;
      // Ignore children with empty start/end so a blank new task doesn't drag the parent dates to ""
      const validStarts = children.map(t => t.start).filter(Boolean);
      const validEnds   = children.map(t => t.end  ).filter(Boolean);
      if (!validStarts.length || !validEnds.length) return; // all children blank → leave parent as-is
      const newStart = validStarts.reduce((a,b) => a<b?a:b);
      const newEnd   = validEnds.reduce((a,b) => a>b?a:b);
      const newDur   = (newStart === newEnd && children.every(c => c.duration === 0)) ? 0 : Math.max(0, difBD(newStart, newEnd) + 1);
      if (map[pid].start !== newStart || map[pid].end !== newEnd || map[pid].duration !== newDur) {
        map[pid] = {...map[pid], start: newStart, end: newEnd, duration: newDur};
        changed = true;
      }
    });
  }
  return tasks.map(t => map[t.id]);
};

// Recompute leaf cascade + parent roll-ups after a STRUCTURAL move (indent / outdent /
// paste) that changes parentId. Without this the moved task's old and new parents keep
// stale summary start/end/duration until the next in-subtree date edit happens to run
// the rollup — the same recompute updateTask runs after a date edit. Pure; preserves
// array order (so a caller can still renumber afterwards).
const recomputeAfterStructureChange = tasks => rollupParentDates(cascadeDates(tasks));

let NOW = fdLocal(new Date()); // local "today"; refreshed live by App (focus / midnight rollover)

// Compute display health from conditional formatting rules
const computeDisplayHealth = (task, settings) => {
  const cf = settings?.cfRules || {};
  if (!task) return task?.health;
  // Rule order matters: more specific overrides general
  if (cf.completeGreen && (task.percentComplete||0) >= 100) return "green";
  if (cf.overdueRed && task.end && task.end < NOW && (task.percentComplete||0) < 100 && task.health !== "green" && task.health !== "paused" && task.health !== "red") return "red";
  if (cf.dueSoonYellow && task.end && task.end >= NOW && task.health === "gray") {
    // Within 7 calendar days
    const today = new Date(NOW + "T12:00:00");
    const end = new Date(task.end + "T12:00:00");
    const days = Math.ceil((end - today) / 86400000);
    if (days <= 7) return "yellow";
  }
  return task.health;
};

// Worst-of-descendants rolled status for each PARENT task — the value the grid shows on a
// collapsed parent. Shared by the project grid (rolledHealthMap) and the cross-project
// dashboard (MasterView) so the two never disagree about a parent's status. Pure; uses raw
// stored child health (a parent reflects what its children actually are).
const HEALTH_PRIO = { red: 4, yellow: 3, paused: 2, green: 1, gray: 0, "": 0 };
const computeRolledHealth = (all) => {
  const rollup = (id, stack) => {
    const children = all.filter(t => t.parentId === id);
    if (!children.length || stack.has(id)) return all.find(t => t.id === id)?.health || "";
    stack.add(id);
    let best = "", bestP = 0;
    for (const c of children) { const h = rollup(c.id, stack); const p = HEALTH_PRIO[h] || 0; if (p > bestP) { bestP = p; best = h; } }
    stack.delete(id);
    return best;
  };
  const map = {};
  all.forEach(t => { if (all.some(c => c.parentId === t.id)) map[t.id] = rollup(t.id, new Set()); });
  return map;
};

const fmtD = s => { if (!s) return ""; const [y,m,d] = s.split('-'); if (!y||!m||!d) return ""; return String(+m).padStart(2,'0')+'/'+String(+d).padStart(2,'0')+'/'+y.slice(2); };
const toShortDate = s => { if (!s) return ""; const [y,m,d] = s.split("-"); return `${+m}/${+d}/${y.slice(2)}`; };
// Export filename — matches the Site Planner's PDF/PNG naming (src/workspaces/site-planner/lib/printSheet.js
// → "YYYY.MM.DD {Project} - {Plan}"): here "YYYY.MM.DD {Project} - Schedule" (the trailing slot is the
// document type, since a project has one schedule). A single selected project uses its name; multiple use
// the Planyr brand. Filesystem-illegal chars are stripped (same rule as sanitizeFilename). The caller adds
// the .pdf/.html/.json extension; for the PDF exhibit this string is the <title> the browser's "Save as
// PDF" uses as the filename.
const scheduleExportName = (projects, date = new Date()) => {
  const p2 = n => String(n).padStart(2, "0");
  const stamp = `${date.getFullYear()}.${p2(date.getMonth() + 1)}.${p2(date.getDate())}`;
  const clean = s => String(s == null ? "" : s).replace(/[\u0000-\u001f\\/:*?"<>|]/g, " ").replace(/\s+/g, " ").trim();
  const names = (Array.isArray(projects) ? projects : []).map(p => p && p.name).filter(Boolean);
  const proj = clean(names.length === 1 ? names[0] : "Planyr") || "Planyr";
  return `${stamp} ${proj} - Schedule`;
};
const parseFlexDate = s => {
  if (!s) return null; s = String(s).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const parts = s.split(/[\/\-\.]/);
  if (parts.length < 2) return null;
  const m = parseInt(parts[0], 10), d = parseInt(parts[1], 10);
  let y = (parts[2] !== undefined && parts[2] !== "") ? parseInt(parts[2], 10) : new Date().getFullYear();
  if (!Number.isFinite(m) || !Number.isFinite(d) || !Number.isFinite(y)) return null;  // reject "-5/-5" → "NaN-NaN-05"
  if (y < 100) y += 2000;
  if (m < 1 || m > 12 || d < 1 || d > 31 || y < 2000) return null;
  const iso = `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  // Reject impossible calendar dates (e.g. 2/31) — silently rolling Feb 31 → Mar 3 is
  // worse than rejecting the edit (a wrong date beats a refused one is NOT our rule here).
  const chk = new Date(iso + "T12:00:00");
  if (isNaN(chk) || chk.getMonth() + 1 !== m || chk.getDate() !== d) return null;
  return iso;
};

// Fix #1: helper – pick a sensible default start for a new task
const defaultStartFor = (tasks, parentId, excludeId = null) => {
  if (parentId !== null) {
    const parent = tasks.find(t => t.id === parentId);
    if (parent?.start) return parent.start;
  }
  const sibs = tasks.filter(t => t.parentId === parentId && t.id !== excludeId);
  for (let i = sibs.length - 1; i >= 0; i--) {
    if (sibs[i].start) return sibs[i].start;
  }
  return NOW;
};

// Fix #1e: guard mkt so a bad caller can never crash the app with an invalid date.
// Also supports "blank" tasks: pass start="" AND dur="" (or null) → task is created with
// no start, no end, no duration. Callers that want a real date keep passing valid args.
const mkt = (id, name, start, dur, parentId=null, health="gray", predecessors=[]) => {
  const isBlank = !start && (dur === "" || dur === null || dur === undefined);
  const safeStart = isBlank ? "" : ((start && !isNaN(new Date(start).getTime())) ? start : NOW);
  // Blank tasks are born at 0d (renders "0d", never a bare "d"); dates stay
  // empty until the user types one — calcEnd("", 0) is "" by design.
  const safeDur   = isBlank ? 0 : dur;
  return {
    id, name, start: safeStart, end: calcEnd(safeStart, safeDur), duration: safeDur, predecessors, health,
    percentComplete: health==="green" ? 100 : health==="yellow" ? 40 : 0,
    parentId, responsibleParty: "", cost: "", notes: [], isExpanded: true,
  };
};

// Renumber all tasks by array position (1-based) and fix all ID references
const renumberTasks = (tasks) => {
  const map = {};
  tasks.forEach((t, i) => { map[t.id] = i + 1; });
  return tasks.map((t, i) => ({
    ...t,
    id: i + 1,
    parentId: t.parentId !== null && t.parentId !== undefined ? (map[t.parentId] ?? null) : null,
    predecessors: normPreds(t.predecessors).map(p => ({...p, id: map[p.id]})).filter(p => p.id),
  }));
};

// Sort tasks array into visual (tree-walk) order so IDs always match what the user sees
const sortByVisualOrder = (tasks) => {
  const childMap = {};
  tasks.forEach(t => {
    const p = t.parentId ?? null;
    if (!childMap[p]) childMap[p] = [];
    childMap[p].push(t);
  });
  const result = [];
  const walk = (parentId) => {
    (childMap[parentId] || []).forEach(t => { result.push(t); walk(t.id); });
  };
  walk(null);
  // Append any orphaned tasks (parentId pointing to non-existent task) at the end
  const seen = new Set(result.map(t => t.id));
  tasks.filter(t => !seen.has(t.id)).forEach(t => result.push(t));
  return result;
};

// ── Task-complete celebration ("Ring & Spark" toast) ──────
// A small toast rises from the bottom-center when a task transitions to
// Complete: the green dot pops in, the check draws itself, a ring pulses
// outward, and a few sparks fan up — then it sinks away after ~2.3s.
// Bottom-anchored (not in the row) so it stays visible even when the
// successor prompt modal opens; z-index above all modals, pointer-events:none
// so it never blocks a click. Pure Web Animations API on a body-level node —
// survives React re-renders. A new completion replaces the previous toast.
function celebrateTaskComplete(taskName) {
  try {
    document.getElementById("planar-celebrate-toast")?.remove();
    document.getElementById("planar-delete-toast")?.remove(); // same anchor spot — never stack
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const toast = document.createElement("div");
    toast.id = "planar-celebrate-toast";
    // env(safe-area-inset-bottom) keeps it clear of the iPhone home bar
    toast.style.cssText = "position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom, 0px));transform:translateX(-50%);z-index:100002;pointer-events:none;";

    const card = document.createElement("div");
    card.style.cssText = "display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #d0d7de;border-radius:10px;padding:10px 16px 10px 13px;box-shadow:0 6px 24px rgba(27,31,36,.16),0 1px 3px rgba(27,31,36,.08);font-family:'Inter',system-ui,-apple-system,sans-serif;";
    toast.appendChild(card);

    // Dot + ring + sparks share one positioning context; nothing in the
    // ancestor chain clips, so sparks can fly past the card's top edge.
    const dotWrap = document.createElement("span");
    dotWrap.style.cssText = "position:relative;width:20px;height:20px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;";
    const ring = document.createElement("span");
    ring.style.cssText = "position:absolute;left:50%;top:50%;width:20px;height:20px;margin:-10px 0 0 -10px;border-radius:50%;border:2px solid #16a34a;opacity:0;";
    const dot = document.createElement("span");
    dot.style.cssText = "position:relative;width:20px;height:20px;border-radius:50%;background:#16a34a;display:inline-flex;align-items:center;justify-content:center;";
    dot.innerHTML = '<svg width="12" height="12" viewBox="0 0 13 13" fill="none"><path d="M3 6.7 L5.5 9.2 L10 3.8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray:14;stroke-dashoffset:14;"/></svg>';
    dotWrap.appendChild(ring);
    dotWrap.appendChild(dot);
    card.appendChild(dotWrap);

    // textContent (not innerHTML) so task names can never inject markup
    const text = document.createElement("span");
    const nameEl = document.createElement("div");
    nameEl.style.cssText = "font-size:12.5px;font-weight:600;color:#1f2328;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.35;";
    nameEl.textContent = (taskName || "Task").toString();
    const subEl = document.createElement("div");
    subEl.style.cssText = "font-size:11px;font-weight:500;color:#15803d;line-height:1.35;";
    subEl.textContent = "Marked complete";
    text.appendChild(nameEl); text.appendChild(subEl);
    card.appendChild(text);

    document.body.appendChild(toast);

    const chk  = dot.querySelector("path");
    const LIFE = 2300; // ms fully visible before the exit begins
    const exit = (dur) => {
      toast.animate(
        [{transform:"translateX(-50%) translateY(0)", opacity:1},
         {transform:"translateX(-50%) translateY(10px)", opacity:0}],
        {duration:dur, easing:"cubic-bezier(.4,0,1,1)", fill:"forwards"}
      );
      setTimeout(() => toast.remove(), dur + 30);
    };

    if (reduce) {
      // Reduced motion: keep the informative toast, drop the theatrics
      if (chk) chk.style.strokeDashoffset = "0";
      toast.animate([{opacity:0},{opacity:1}], {duration:150, fill:"forwards"});
      setTimeout(() => exit(200), LIFE);
      return;
    }

    // Entry: rise with a slight overshoot
    toast.animate(
      [{transform:"translateX(-50%) translateY(16px)", opacity:0},
       {transform:"translateX(-50%) translateY(-2px)", opacity:1, offset:.7},
       {transform:"translateX(-50%) translateY(0)",    opacity:1}],
      {duration:300, easing:"cubic-bezier(.22,1,.36,1)", fill:"forwards"}
    );
    // Dot pops into existence
    dot.animate(
      [{transform:"scale(.4)"},{transform:"scale(1.28)",offset:.55},{transform:"scale(.95)",offset:.8},{transform:"scale(1)"}],
      {duration:420, delay:90, easing:"cubic-bezier(.34,1.56,.64,1)", fill:"backwards"}
    );
    // Check draws in (style fallback in case WAAPI can't tween SVG dashoffset)
    if (chk) {
      chk.animate([{strokeDashoffset:14},{strokeDashoffset:0}], {duration:320, delay:200, easing:"cubic-bezier(.65,0,.35,1)", fill:"forwards"});
      setTimeout(() => { chk.style.strokeDashoffset = "0"; }, 540);
    }
    // Ring pulses outward
    ring.animate(
      [{transform:"scale(.9)", opacity:.55},{transform:"scale(2.6)", opacity:0}],
      {duration:620, delay:160, easing:"cubic-bezier(.22,1,.36,1)", fill:"forwards"}
    );
    // Sparks fan upward out of the card
    const colors = ["#16a34a","#22c55e","#4f46e5","#16a34a","#34d399","#4f46e5"];
    const N = 6;
    for (let i = 0; i < N; i++) {
      const s = document.createElement("span");
      s.style.cssText = `position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;border-radius:50%;background:${colors[i % colors.length]};opacity:0;`;
      dotWrap.appendChild(s);
      const ang  = (-90 + (i / (N - 1) - 0.5) * 150) * Math.PI / 180; // fan upward
      const dist = 22 + Math.random() * 14;
      const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist;
      s.animate(
        [{transform:"translate(0,0) scale(1)",                       opacity:1},
         {transform:`translate(${dx*.55}px,${dy*.55}px) scale(.7)`,  opacity:1, offset:.4},
         {transform:`translate(${dx}px,${dy}px) scale(.35)`,         opacity:0}],
        {duration:580, delay:170, easing:"cubic-bezier(.18,.7,.3,1)", fill:"forwards"}
      );
    }
    setTimeout(() => exit(240), LIFE);
  } catch (e) { /* celebration is decorative — never let it break a real update */ }
}

    toast.animate(
      [{transform:"translateX(-50%) translateY(16px)", opacity:0},
       {transform:"translateX(-50%) translateY(-2px)", opacity:1, offset:.7},
       {transform:"translateX(-50%) translateY(0)",    opacity:1}],
      {duration:280, easing:"cubic-bezier(.22,1,.36,1)", fill:"forwards"}
    );
    setTimeout(() => exit(240), LIFE);
  } catch (e) { /* informational — never let the toast block a delete */ }
}

function SuccessorPromptModal({ prompt, updateTask, onClose, onOpenTask }) {

  const alreadyActive = successors.filter(t => t.health !== 'gray');

  const [pending, setPending] = React.useState(() => {
    const m = {};
    successors.forEach(t => { m[t.id] = t.health === 'gray' ? 'yellow' : null; });
    return m;
  });

  const changeCount = Object.values(pending).filter(v => v !== null).length;

  function apply() {
    Object.entries(pending).forEach(([tid, hk]) => {
      if (hk !== null) updateTask(Number(tid), { health: hk }, projId);
    });
    onClose();
  }

  function StatusPills({ task }) {
    const opts = [
      { k:'gray',   label:'Not Started' },
      { k:'yellow', label:'In Progress' },

          const h = HEALTH[o.k]||HEALTH.gray;

            <button key={o.k} onClick={()=>setPending(p=>({...p,[task.id]:o.k}))}
              style={{display:'flex',alignItems:'center',gap:5,fontSize:10,padding:'3px 9px',

          <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
            <span style={{width:7,height:7,borderRadius:'50%',

            <span style={{fontSize:10,color:'#6b7280',whiteSpace:'nowrap'}}>{h.label}</span>
          </div>
        </div>
        <StatusPills task={task} />

            <span onClick={()=>onOpenTask(projId, task.id)}

        width:480,maxWidth:'94vw',maxHeight:'82vh',display:'flex',flexDirection:'column',overflow:'hidden'}}
        tabIndex={-1} ref={el=>el?.focus()}
        onKeyDown={e=>{if(e.key==='Escape')onClose();if(e.key==='Enter'&&changeCount>0)apply();}}>
        {/* Header */}

        </div>
        {/* Body */}
        <div style={{flex:1,overflowY:'auto',padding:'14px 20px'}}>
          {readyToStart.length>0 && (<>

          {alreadyActive.length>0 && (<>
            <div style={{fontSize:10,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8,marginTop:readyToStart.length?12:0,display:'flex',alignItems:'center',gap:6}}>

            {alreadyActive.map(t=><TaskRow key={t.id} task={t} accent={false}/>)}
          </>)}
        </div>
        {/* Footer */}
        <div style={{padding:'12px 20px',borderTop:'1px solid #e5e7eb',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:8,background:'#f9fafb',flexShrink:0}}>
          <span style={{fontSize:11,color:'#9ca3af',marginRight:'auto'}}>
            {changeCount>0?`${changeCount} update${changeCount!==1?'s':''} pending`:'No changes'}
          </span>
          <button onClick={onClose}
            style={{fontSize:12,padding:'7px 16px',borderRadius:6,border:'1px solid #e5e7eb',background:'#fff',color:'#374151',cursor:'pointer',fontFamily:'inherit',fontWeight:500}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='#6b7280'} onMouseLeave={e=>e.currentTarget.style.borderColor='#e5e7eb'}>
            Skip
          </button>
          <button onClick={apply} disabled={!changeCount}
            style={{fontSize:12,padding:'7px 18px',borderRadius:6,fontFamily:'inherit',fontWeight:600,
              cursor:changeCount?'pointer':'not-allowed',
              border:changeCount?'1px solid #4f46e5':'1px solid #e5e7eb',
              background:changeCount?'#4f46e5':'#f3f4f6',
              color:changeCount?'#fff':'#9ca3af'}}>
            Update Successors
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Contacts ──────────────────────────────────────────────
function getInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}
const AVATAR_COLORS = ['#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];
function avatarColor(name) {
  if (!name) return '#94a3b8';
  let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

// Shared canvas for measuring typed-text width so the inline ghost prediction
// lines up exactly with the input's text regardless of font/padding.
const _cpCanvas = (typeof document !== 'undefined') ? document.createElement('canvas') : null;
const _cpCtx = _cpCanvas ? _cpCanvas.getContext('2d') : null;
function _cpMeasure(text, font) { if (!_cpCtx) return 0; _cpCtx.font = font; return _cpCtx.measureText(text).width; }

function ContactPicker({ value, contacts, onCommit, onCancel, variant = "master" }) {
  const isGrid = variant === "grid";
  const [query, setQuery] = React.useState(value || '');
  const [highlight, setHighlight] = React.useState(-1);
  const [pos, setPos] = React.useState(null);      // portal dropdown rect {left,top,width}
  const [ghost, setGhost] = React.useState(null);  // {left, fontSize, fontFamily, fontWeight}
  const inputRef = React.useRef(null);
  const wrapRef = React.useRef(null);

  React.useEffect(() => { inputRef.current?.focus(); inputRef.current?.select(); }, []);

  const q = query.trim().toLowerCase();
  const suggestions = (q
    ? contacts.filter(c => c.name.toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q))
    : contacts
  ).slice(0, 6);

  const trimmed = query.trim();
  const isNewName = trimmed.length > 0 && !contacts.some(c => c.name.toLowerCase() === trimmed.toLowerCase());
  const totalItems = suggestions.length + (isNewName ? 1 : 0);

  // Inline prediction = first contact whose name starts with what's typed (prefix match)
  const prediction = query
    ? contacts.find(c => c.name.toLowerCase().startsWith(query.toLowerCase()) && c.name.length > query.length)
    : null;
  const ghostText = prediction ? prediction.name.slice(query.length) : '';

  React.useEffect(() => { setHighlight(h => h >= totalItems ? -1 : h); }, [totalItems]);

  // Position portal dropdown under the input + compute the ghost text offset
  const reposition = React.useCallback(() => {
    const el = inputRef.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    setPos({ left: r.left, top: r.bottom + 2, width: Math.max(220, r.width) });
    const cs = window.getComputedStyle(el);
    const fontFamily = cs.fontFamily, fontSize = cs.fontSize, fontWeight = cs.fontWeight || '400';
    const padL = parseFloat(cs.paddingLeft) || 0;
    const bordL = parseFloat(cs.borderLeftWidth) || 0;
    const w = _cpMeasure(query, `${fontWeight} ${fontSize} ${fontFamily}`);
    setGhost({ left: padL + bordL + w, fontSize, fontFamily, fontWeight });
  }, [query]);

  React.useLayoutEffect(() => { reposition(); }, [reposition]);
  React.useEffect(() => {
    const fn = () => reposition();
    window.addEventListener('scroll', fn, true);
    window.addEventListener('resize', fn);
    return () => { window.removeEventListener('scroll', fn, true); window.removeEventListener('resize', fn); };
  }, [reposition]);

  function commitTyped() {
    if (!trimmed) { onCommit(''); return; }
    const existing = contacts.find(c => c.name.toLowerCase() === trimmed.toLowerCase());
    if (existing) onCommit(existing.name);
    else onCommit(trimmed, { name: trimmed, email: '' }); // auto-add as new contact
  }
  function selectItem(i) { if (i < suggestions.length) onCommit(suggestions[i].name); else commitTyped(); }
  function acceptGhost() {
    if (!prediction) return;
    const full = prediction.name;
    setQuery(full);
    requestAnimationFrame(() => { const el = inputRef.current; if (el) el.setSelectionRange(full.length, full.length); });
  }

  // Outside click commits typed text (don't lose work). Clicks in the portal dropdown are ignored.
  React.useEffect(() => {
    function onDocMouseDown(e) {
      if (wrapRef.current && wrapRef.current.contains(e.target)) return;
      if (e.target.closest && e.target.closest('[data-contact-dd]')) return;
      commitTyped();
    }
    document.addEventListener('mousedown', onDocMouseDown);
    return () => document.removeEventListener('mousedown', onDocMouseDown);
  }, [query]);

  function onKeyDown(e) {
    if (e.key === 'Escape') { e.stopPropagation(); onCancel(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); setHighlight(h => Math.min(h + 1, totalItems - 1)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setHighlight(h => Math.max(h - 1, -1)); return; }
    if (e.key === 'ArrowRight') {
      const el = inputRef.current;
      const atEnd = el && el.selectionStart === query.length && el.selectionEnd === query.length;
      if (ghostText && atEnd) { e.preventDefault(); acceptGhost(); }
      return;
    }
    if (e.key === 'Enter' || e.key === 'Tab') {
      e.stopPropagation();
      if (e.key === 'Enter') e.preventDefault();
      if (highlight >= 0 && highlight < totalItems) selectItem(highlight);
      else if (ghostText && prediction) onCommit(prediction.name);
      else commitTyped();
      return;
    }
  }

  const masterInputStyle = { display:'block', width:'100%', height:'18px', border:'none', borderBottom:'1.5px solid var(--blue)',
    outline:'none', background:'transparent', color:'var(--txt)', fontSize:12, fontFamily:'inherit', padding:'0 2px' };

  const dropdown = (totalItems > 0 && pos) ? ReactDOM.createPortal(
    <div data-contact-dd style={{position:'fixed', left:pos.left, top:pos.top, width:pos.width, zIndex:100000,
      background:'#fff', border:'1px solid var(--bd2)', borderRadius:7, boxShadow:'0 6px 20px rgba(0,0,0,.13)',
      overflow:'hidden', maxHeight:220, overflowY:'auto'}}>
      {suggestions.map((c, i) => (
        <div key={c.id}
          onMouseEnter={()=>setHighlight(i)}
          onMouseDown={e=>{ e.preventDefault(); onCommit(c.name); }}
          style={{display:'flex', alignItems:'center', gap:8, padding:'7px 10px', cursor:'pointer',
            background: highlight===i ? '#f0f2ff' : 'transparent'}}>
          <div style={{width:24,height:24,borderRadius:'50%',background:avatarColor(c.name),
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff',flexShrink:0}}>{getInitials(c.name)}</div>
          <div style={{minWidth:0}}>
            <div style={{fontSize:12,color:'var(--txt)',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</div>
            {c.email && <div style={{fontSize:10,color:'var(--mut)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.email}</div>}
          </div>
        </div>
      ))}
      {isNewName && (
        <div onMouseEnter={()=>setHighlight(suggestions.length)}
          onMouseDown={e=>{ e.preventDefault(); commitTyped(); }}
          style={{display:'flex', alignItems:'center', gap:7, padding:'7px 10px', cursor:'pointer',
            borderTop: suggestions.length ? '1px solid var(--bd)' : 'none',
            color:'var(--blue)', fontSize:11, fontWeight:500,
            background: highlight===suggestions.length ? '#f0f5ff' : 'transparent'}}>
          <span style={{fontSize:14,lineHeight:1}}>+</span>
          <span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>Add "<span style={{fontWeight:600}}>{trimmed}</span>" as new contact</span>
        </div>
      )}
    </div>, document.body) : null;

  return (
    <div ref={wrapRef} style={{position:'relative', width:'100%'}}>
      <input ref={inputRef} value={query}
        className={isGrid ? "ei" : undefined}
        style={isGrid ? undefined : masterInputStyle}
        onChange={e=>setQuery(e.target.value)}
        onKeyDown={onKeyDown}
        placeholder="Type a name…" />
      {ghostText && ghost && (
        <span aria-hidden style={{position:'absolute', left:ghost.left, top:0, height:'100%',
          display:'flex', alignItems:'center', pointerEvents:'none', whiteSpace:'pre',
          fontSize:ghost.fontSize, fontFamily:ghost.fontFamily, fontWeight:ghost.fontWeight,
          color:'var(--mut)', opacity:0.5, overflow:'hidden',
          maxWidth:`calc(100% - ${ghost.left}px - 4px)`}}>{ghostText}</span>
      )}
      {dropdown}
    </div>
  );
}

function ContactsPanel({ data, setData, onClose }) {
  const contacts = data.settings?.contacts || [];
  const [editId, setEditId] = React.useState(null);
  const [editName, setEditName] = React.useState('');
  const [editEmail, setEditEmail] = React.useState('');
  const [addMode, setAddMode] = React.useState(false);
  const [newName, setNewName] = React.useState('');
  const [newEmail, setNewEmail] = React.useState('');

  function saveContacts(updated) {
    setData(d => ({...d, settings:{...d.settings, contacts: updated}}));
  }
  function startEdit(c) { setEditId(c.id); setEditName(c.name); setEditEmail(c.email||''); setAddMode(false); }
  function commitEdit() {
    if (!editName.trim()) return;
    saveContacts(contacts.map(c => c.id===editId ? {...c, name:editName.trim(), email:editEmail.trim()} : c));
    setEditId(null);
  }
  function del(id) { saveContacts(contacts.filter(c => c.id!==id)); }
  function addContact() {
    if (!newName.trim()) return;
    const id = Date.now();

    setNewName(''); setNewEmail(''); setAddMode(false);

  return (
    <div style={{position:'fixed',inset:0,zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.32)'}}>

        </div>

                    onKeyDown={e=>{if(e.key==='Enter')commitEdit();if(e.key==='Escape')setEditId(null);}} />

                background:'none',border:'1px dashed var(--bd2)',borderRadius:6,padding:'7px 14px',cursor:'pointer',width:'100%',justifyContent:'center',fontFamily:'inherit'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--blue)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--bd2)'}>
              <span style={{fontSize:16,lineHeight:1}}>+</span> Add Contact
            </button>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',gap:8}}>
                <input autoFocus value={newName} onChange={e=>setNewName(e.target.value)}
                  placeholder="Full name *" style={{flex:1,fontSize:12,border:'1px solid var(--blue)',borderRadius:5,padding:'6px 9px',fontFamily:'inherit',outline:'none'}}
                  onKeyDown={e=>{if(e.key==='Enter')addContact();if(e.key==='Escape')setAddMode(false);}} />
                <input value={newEmail} onChange={e=>setNewEmail(e.target.value)}
                  placeholder="Email (optional)" style={{flex:1,fontSize:12,border:'1px solid var(--bd2)',borderRadius:5,padding:'6px 9px',fontFamily:'inherit',outline:'none'}}
                  onFocus={e=>e.target.style.borderColor='var(--blue)'} onBlur={e=>e.target.style.borderColor='var(--bd2)'}
                  onKeyDown={e=>{if(e.key==='Enter')addContact();if(e.key==='Escape')setAddMode(false);}} />

                  border:'1px solid var(--amber)',background:'#eef2ff',color:'var(--amber)',cursor:'pointer',fontFamily:'inherit',fontWeight:500}}>
