<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Not found · Planyr</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: grid; place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #efeadf; color: #2b2620;
      }
      .card { max-width: 460px; padding: 24px; text-align: center; }
      h1 { margin: 0 0 6px; font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
      p { margin: 0 0 16px; font-size: 13.5px; line-height: 1.5; color: #6b6453; }
      a { color: #e8590c; font-weight: 700; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <!--
      Served for genuine 404s (and, via _redirects, for missing /assets/* chunks). Kept
      deliberately tiny and dependency-free so it loads even when the app bundle can't.
    -->
    <div class="card">
      <h1>That page isn't here</h1>
      <p>The link may be out of date, or Planyr may have just been updated in the background.</p>
      <p><a href="/">Go to Planyr</a></p>
    </div>
  </body>
</html>
