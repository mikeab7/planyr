<!doctype html>
<!-- B134 in-browser verification: render the NWI wetlands layer the SAME WAY the app does —
     esri-leaflet dynamicMapLayer (kind:"dynamic") at the crisp VECTOR MapServer
     Test/Wetlands_gdb_split, layers:[1,2] (CONUS East+West) — over Sheldon Lake. Proves the
     wetlands paint as true-shape polygons (the Wetlands Mapper look), not 100m raster blocks,
     and that the /export request returns 200. Served from the repo root so /node_modules/*
     resolves; uses the installed esri-leaflet 3.x (same as the app). -->
<html>
<head>
  <meta charset="utf-8" />
  <title>B134 — NWI wetlands (crisp vector) browser verify</title>
  <link rel="stylesheet" href="/node_modules/leaflet/dist/leaflet.css" />
  <script src="/node_modules/leaflet/dist/leaflet.js"></script>
  <script src="/node_modules/esri-leaflet/dist/esri-leaflet.js"></script>
  <style>
    html,body{margin:0;height:100%}
    /* light grey so transparent (no-wetland) areas read as grey and polygons pop */
    #map{height:100%;width:100%;background:#dfe3e6}
    #tag{position:absolute;z-index:9999;left:8px;top:8px;background:#fff;padding:4px 8px;
         font:12px/1.4 sans-serif;border:1px solid #888;border-radius:4px}
  </style>
</head>
<body>
  <div id="tag">B134 verify — NWI crisp vector @ Test/Wetlands_gdb_split · Sheldon Lake</div>
  <div id="map"></div>
  <script>
    // dynamicMapLayer (vector /export) — the app's "dynamic" kind, like FEMA.
    const NEW_URL = "https://fwsprimary.wim.usgs.gov/server/rest/services/Test/Wetlands_gdb_split/MapServer";
    window.__verify = { basemap: "pending", wetlands: "pending", wetlandsLoaded: false, errors: [] };

    // Sheldon Lake State Park, NE Houston — known wetland complex. Zoom 15 ≈ neighbourhood level.
    const map = L.map("map", { zoomControl: false }).setView([29.872, -95.163], 15);

    try {
      const bm = L.esri.basemapLayer("Imagery");
      bm.on("load", () => { window.__verify.basemap = "loaded"; });
      bm.on("requesterror", () => { window.__verify.basemap = "error"; });
      bm.addTo(map);
    } catch (e) { window.__verify.basemap = "ctor-error"; }

    // EXACT app mechanism for the "dynamic" kind: esri dynamicMapLayer, f:image, layers=show:1,2.
    // App opacity is 0.55; bumped to 0.9 here only so colours read clearly in a screenshot.
    const wetlands = L.esri.dynamicMapLayer({ url: NEW_URL, layers: [1, 2], opacity: 0.9, f: "image" });
    wetlands.on("load", () => { window.__verify.wetlands = "loaded"; window.__verify.wetlandsLoaded = true; });
    wetlands.on("requesterror", (e) => { window.__verify.errors.push(String((e && e.message) || "requesterror")); });
    wetlands.addTo(map);
  </script>
</body>
</html>
